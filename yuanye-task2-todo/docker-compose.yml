services:
  mysql:
    image: mysql:8
    container_name: task2-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: todo_db
    ports:
      - "3306:3306"

  mongodb:
    image: mongo:7
    container_name: task2-mongo
    restart: always
    ports:
      - "27017:27017"
